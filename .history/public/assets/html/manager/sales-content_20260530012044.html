<div class="sales-container">
    <div class="page-header">
        <h2>Gestion des ventes</h2>
        <button class="btn-add" onclick="showAddSaleModal()">+ Nouvelle vente</button>
    </div>
    <div id="sales-list">
        <p>Chargement des ventes...</p>
    </div>
</div>
<script>
function loadSales() {
    if (typeof ManagerAPI !== 'undefined') {
        ManagerAPI.sales.list()
            .then(response => {
                if (response && response.success) {
                    const sales = response.data || [];
                    const container = document.getElementById('sales-list');
                    if (container) {
                        if (sales.length === 0) {
                            container.innerHTML = '<p>Aucune vente trouvée</p>';
                        } else {
                            container.innerHTML = sales.map(s => `
                                <div class="sale-card">
                                    <p>Montant: ${s.total || 0} FBU</p>
                                    <p>Date: ${s.created_at || '—'}</p>
                                </div>
                            `).join('');
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Erreur chargement ventes:', error);
            });
    }
}
loadSales();
</script>
