<div class="mgr-dashboard">
    <!-- Ligne des KPI -->
    <div class="mgr-kpi-row">
        <div class="mgr-kpi">
            <div class="mgr-kpi-label">Ventes aujourd'hui</div>
            <div class="mgr-kpi-value" id="salesDay">0 FBU</div>
        </div>
        <div class="mgr-kpi">
            <div class="mgr-kpi-label">Produits</div>
            <div class="mgr-kpi-value" id="productsCount">0</div>
        </div>
        <div class="mgr-kpi">
            <div class="mgr-kpi-label">Employés</div>
            <div class="mgr-kpi-value" id="employeesCount">0</div>
        </div>
        <div class="mgr-kpi">
            <div class="mgr-kpi-label">Dettes impayées</div>
            <div class="mgr-kpi-value" id="pendingDebts">0 FBU</div>
        </div>
    </div>

    <!-- Bandeau récapitulatif -->
    <div class="mgr-recovery-banner">
        <div class="mgr-recovery-item">
            Stock alerte <strong id="lowStockCount">0</strong>
        </div>
        <div class="mgr-recovery-item">
            Recouvrement mensuel <strong id="recoveryMonth">0 FBU</strong>
        </div>
    </div>

    <!-- Dernière vente -->
    <div class="mgr-card">
        <div class="mgr-card-title">
            <i class="fas fa-receipt"></i> Dernière vente
        </div>
        <div id="lastSaleInfo">—</div>
    </div>
</div>

<script>
    (function() {
        async function loadData() {
            if (typeof ManagerAPI === 'undefined') return;
            try {
                const res = await ManagerAPI.dashboard();
                if (res && res.success) {
                    const ui = res.ui || {};
                    document.getElementById('salesDay').innerText = (ui.salesDay || 0) + ' FBU';
                    document.getElementById('productsCount').innerText = ui.productsCount || 0;
                    document.getElementById('employeesCount').innerText = ui.employeesCount || 0;
                    document.getElementById('pendingDebts').innerText = (ui.pendingDebts || 0) + ' FBU';
                    document.getElementById('lowStockCount').innerText = ui.lowStockCount || 0;
                    document.getElementById('recoveryMonth').innerText = (ui.recoveryMonth || 0) + ' FBU';
                    document.getElementById('lastSaleInfo').innerHTML = `
                        <p>${ui.lastSaleLabel || '—'}</p>
                        <small>${ui.lastSaleDate || ''}</small>
                    `;
                }
            } catch(e) { console.error(e); }
        }
        loadData();
    })();
</script>
