<div class="products-container">
    <div class="mgr-toolbar">
        <div class="tft-form-group">
            <input type="text" id="product-search" placeholder="Rechercher..." class="tft-form-control">
        </div>
        <button class="tft-btn tft-bg-greensav" id="add-product-btn">+ Ajouter un produit</button>
    </div>

    <table class="tft-table">
        <thead>
            <tr class="tft-b-bottom-gris">
                <th class="tft-title3">ID</th>
                <th class="tft-title3">NOM</th>
                <th class="tft-title3">DESCRIPTION</th>
                <th class="tft-title3">PRIX UNITAIRE</th>
                <th class="tft-title3">STOCK</th>
                <th class="tft-title3">STATUS</th>
                <th class="tft-title3">ACTION</th>
            </tr>
        </thead>
        <tbody id="products-table-body">
            <tr><td colspan="7" class="mgr-empty-hint">Chargement…</td></tr>
        </tbody>
    </table>

    <div class="tft-pagination" id="products-pagination">
        <div class="tft-icon-round-moyen tft-bdr-greensav-1 tft-hover-greensav" id="prev-page-btn">
            <i class="fas fa-arrow-left tft-color-white"></i>
        </div>
        <ul class="tft-page-numbers" id="page-numbers-list"></ul>
        <div class="tft-icon-round-moyen tft-bdr-greensav-1 tft-hover-greensav" id="next-page-btn">
            <i class="fas fa-arrow-right tft-color-white"></i>
        </div>
    </div>
</div>

<script>
    (function() {
        // Variables de pagination
        let currentPage = 1;
        const ITEMS_PER_PAGE = 8;
        let totalPages = 1;
        let allProducts = [];

        // Éléments DOM
        const tbody = document.getElementById('products-table-body');
        const searchInput = document.getElementById('product-search');
        const prevBtn = document.getElementById('prev-page-btn');
        const nextBtn = document.getElementById('next-page-btn');
        const pageList = document.getElementById('page-numbers-list');
        const addBtn = document.getElementById('add-product-btn');

        // Helpers (utilise ceux déjà présents dans manager-ui.js)
        const fmtMoney = (n) => (Number(n) || 0).toLocaleString('fr-FR') + ' FBU';
        const escapeHtml = (s) => {
            if (!s) return '';
            return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        };

        function getStockStatus(product) {
            const stock = product.current_stock;
            const threshold = product.low_stock_threshold || 5;
            if (stock <= 0) return { class: 'tft-stock-badge-red1', text: 'Rupture' };
            if (stock <= threshold) return { class: 'tft-stock-badge-yellow1', text: 'Stock bas' };
            return { class: 'tft-stock-badge-green1', text: 'OK' };
        }

        async function loadProducts(page = 1) {
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="7" class="mgr-empty-hint">Chargement…</td></tr>';
            try {
                const res = await ManagerAPI.products.list({ page: page, limit: ITEMS_PER_PAGE });
                if (!res.success) throw new Error(res.message);
                allProducts = res.data || [];
                const pagination = res.pagination || {};
                currentPage = pagination.currentPage || page;
                totalPages = pagination.totalPages || 1;
                renderProducts(allProducts);
                updatePagination();
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="7" class="mgr-empty-hint tft-clr-red">Erreur : ${escapeHtml(err.message)}</td></tr>`;
            }
        }

        function renderProducts(products) {
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="mgr-empty-hint">Aucun produit</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => {
                const status = getStockStatus(p);
                return `
                    <tr class="tft-b-bottom-gris">
                        <td class="tft-title4 tft-clr-white3">${p.id}</td>
                        <td class="tft-title4 tft-clr-white3">${escapeHtml(p.name)}</td>
                        <td class="tft-title4 tft-clr-white3">${escapeHtml(p.description || '—')}</td>
                        <td class="tft-title4 tft-clr-white3">${fmtMoney(p.unit_price)}</td>
                        <td class="tft-title4 tft-clr-white3">${p.current_stock}</td>
                        <td class="${status.class}"><div class="tft-stock-dot"></div><div class="tft-stock-info"><p>${status.text}</p></div></td>
                        <td class="tft-bdr-l-gris-1">
                            <div class="actions">
                                <div class="tft-icon-round-petit tft-bg-black2 tft-bdr-greensav-1 edit-product" data-id="${p.id}">
                                    <i class="fe fe-edit tft-clr-greensav"></i>
                                </div>
                                <div class="tft-icon-round-petit tft-bg-black2 tft-bdr-red-txt-1 delete-product" data-id="${p.id}">
                                    <i class="fe fe-trash delete-icon tft-clr-red"></i>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            // Attacher événements
            document.querySelectorAll('.edit-product').forEach(btn => {
                btn.removeEventListener('click', handleEdit);
                btn.addEventListener('click', handleEdit);
            });
            document.querySelectorAll('.delete-product').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });
        }

        async function handleEdit(e) {
            const id = e.currentTarget.dataset.id;
            // Appeler une modale d'édition (à implémenter)
            alert(`Modification du produit ${id} – à implémenter`);
        }

        async function handleDelete(e) {
            const id = e.currentTarget.dataset.id;
            if (!confirm('Supprimer ce produit ?')) return;
            try {
                await ManagerAPI.products.remove(id);
                showToast('Produit supprimé', false);
                await loadProducts(currentPage);
            } catch (err) {
                showToast(err.message, true);
            }
        }

        function updatePagination() {
            if (!pageList) return;
            pageList.innerHTML = '';
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `tft-icon-carre-petit tft-clr-white3 tft-br-none ${i === currentPage ? 'tft-active-page' : ''}`;
                li.textContent = i;
                li.style.cursor = 'pointer';
                li.onclick = () => loadProducts(i);
                pageList.appendChild(li);
            }
        }

        // Navigation
        if (prevBtn) prevBtn.onclick = () => { if (currentPage > 1) loadProducts(currentPage - 1); };
        if (nextBtn) nextBtn.onclick = () => { if (currentPage < totalPages) loadProducts(currentPage + 1); };

        // Recherche (optionnelle, à implémenter via l’API)
        if (searchInput) {
            searchInput.addEventListener('input', () => {
                // Idéalement, appeler l’API avec un paramètre search
                console.log('Recherche :', searchInput.value);
            });
        }

        // Ajout produit (modale à créer)
        if (addBtn) addBtn.addEventListener('click', () => {
            alert('Ajout de produit – à implémenter');
        });

        // Chargement initial
        loadProducts();
    })();
</script>
