<div class="mgr-products">
    <div class="mgr-toolbar">
        <div class="tft-form-group">
            <input type="text" id="product-search" placeholder="Rechercher..." class="tft-form-control">
        </div>
        <button class="tft-btn tft-bg-greensav" id="add-product-btn">+ Ajouter</button>
    </div>
    <div class="mgr-card">
        <table class="tft-table" style="width:100%">
            <thead>
                <tr><th>Nom</th><th>Prix</th><th>Stock</th><th>Actions</th></tr>
            </thead>
            <tbody id="products-list-body">
                <tr><td colspan="4" class="mgr-empty-hint">Chargement...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    async function loadProducts() {
        if (!window.ManagerAPI) return;
        try {
            const res = await ManagerAPI.products.list();
            if (res && res.success) {
                const products = res.data || [];
                const tbody = document.getElementById('products-list-body');
                if (!tbody) return;
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="mgr-empty-hint">Aucun produit</td></tr>';
                    return;
                }
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${escapeHtml(p.name)}</td>
                        <td>${p.price} FBU</td>
                        <td class="${p.stock_quantity <= p.low_stock_threshold ? 'mgr-stock-low' : ''}">${p.stock_quantity}</td>
                        <td><button class="tft-btn-sm tft-bg-orangesav" onclick="editProduct(${p.id})">Modifier</button></td>
                    </tr>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }
    window.editProduct = (id) => { alert('Édition à implémenter'); };
    document.getElementById('add-product-btn')?.addEventListener('click', () => { alert('Ajout à implémenter'); });
    loadProducts();
</script>
