<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/tft-configStyles.css">
    <link rel="stylesheet" href="assets/css/responsiveStyles.css">
    <link rel="stylesheet" href="assets/font-awesome/css/all.min.css">
    <title>Connexion - 1000Saveurs</title>
</head>
<body>
<div class="container-connection">
    <div class="connection-left">
        <div class="tft-avatar-profil-moyen">
            <img src="assets/images/icons/abonnes.png" alt="">
        </div>
        <h1 class="app-name">1000<span>Saveurs</span></h1>
        <h1 class="tft-title3 tft-clr-black3 tft-fw-600 tft-mt-M15">Se connecter</h1>
        <form id="loginForm" class="tft-form">
            <div class="connection-input">
                <div class="tft-icon-carre-moyen">
                    <i class="fas fa-envelope"></i>
                </div>
                <input type="email" id="email" class="tft-form-control" placeholder="Email" required>
            </div>
            <div class="connection-input">
                <div class="tft-icon-carre-moyen">
                    <i class="fas fa-key"></i>
                </div>
                <input type="password" id="password" class="tft-form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="tft-btn tft-bg-remain-greensav tft-clr-white">Connexion</button>
            <div class="connection-options">
                <a class="tft-title4">Mot de passe oublié?</a>
                <a href="#" class="tft-title4">S'inscrire</a>
            </div>
            <div id="error-message"></div>
        </form>
    </div>
</div>
<script src="assets/js/login.js">

</script>
</body>
</html>
