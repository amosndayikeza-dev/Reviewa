<div class="stock-container">
    <div class="mgr-toolbar">
        <div class="tft-form-group">
            <input type="text" id="stock-search" placeholder="Rechercher un produit..." class="tft-form-control">
        </div>
        <button class="tft-btn tft-bg-greensav" id="adjust-stock-btn">+ Ajuster le stock</button>
    </div>
    <div class="mgr-card">
        <table class="tft-table" style="width:100%">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Description</th>
                    <th>Prix unitaire</th>
                    <th>Stock actuel</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="stock-state-body">
                <tr><td colspan="6" class="mgr-empty-hint">Chargement…</div></td>
            </tbody>
        </table>
    </div>
</div>
